<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>wasm-vm — PR previews</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; background:#090b0f; color:#eef2f7;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      display:flex; align-items:flex-start; justify-content:center; padding:48px 20px; }
    main { width:100%; max-width:680px; }
    h1 { font-size:20px; margin:0 0 4px; font-weight:650; }
    .sub { color:#9aa6b2; font:13px ui-monospace, monospace; margin:0 0 24px; }
    ul { list-style:none; margin:0; padding:0; border:1px solid #242b36; border-radius:10px; overflow:hidden; }
    li a { display:flex; justify-content:space-between; align-items:center; gap:16px;
      padding:14px 18px; text-decoration:none; color:#eef2f7; border-bottom:1px solid #1a1f28;
      background:#10141b; transition:background 120ms; }
    li:last-child a { border-bottom:0; }
    li a:hover { background:#151c26; }
    .num { font:650 15px ui-monospace, monospace; }
    .arrow { color:#53d4ff; font:12px ui-monospace, monospace; }
    .empty { padding:18px; color:#9aa6b2; text-align:center; font:13px ui-monospace, monospace; }
    footer { margin-top:22px; color:#6b7684; font:12px ui-monospace, monospace; }
    footer a { color:#9aa6b2; }
  </style>
</head>
<body>
  <main>
    <h1>wasm-vm — RV64 in the browser</h1>
    <p class="sub">2 open PR preview(s) · newest first</p>
    <ul>
      <li><a href="./pr-160/"><span class="num">PR #160</span><span class="arrow">live preview →</span></a></li>
      <li><a href="./pr-57/"><span class="num">PR #57</span><span class="arrow">live preview →</span></a></li>
    </ul>
    <footer>Each PR deploys a live preview here via the <code>pages</code> workflow · <a href="https://github.com/BLamy/wasm-vm">source</a></footer>
  </main>
</body>
</html>
