[package]
name = "wasm-vm-slirp"
edition.workspace = true
license.workspace = true
repository.workspace = true

# E3-T14: the NAT/addressing core (pass 1) has no deps. Pass 2 adds smoltcp — the TCP/IP stack that
# parses/answers guest frames (ARP/ICMP now; TCP bridge next). tokio (the NativeConnector) still
# arrives later behind a feature so the browser build never pulls it.
[dependencies]
smoltcp = { version = "0.13", default-features = false, features = [
    "std",
    "medium-ethernet",
    "proto-ipv4",
    "socket-tcp",
    "socket-icmp",
    "socket-udp",
] }
