[package]
name = "wasm-vm-cli"
description = "Native runner for the emulator core — full-speed testing without a browser"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true
license.workspace = true

[[bin]]
name = "wasm-vm"
path = "src/main.rs"

[dependencies]
wasm-vm-core = { workspace = true, features = ["std", "trace"] }
clap = { workspace = true }
log = { workspace = true }
env_logger = { workspace = true }

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
tempfile = "3"
serde_json = "1"
criterion = { version = "0.5", default-features = false, features = ["cargo_bench_support"] }

[[bench]]
name = "interp"
harness = false
