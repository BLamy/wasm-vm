# Build the browser demo (web/) and deploy it to GitHub Pages.
#   - push to main → deploy to the site ROOT (https://blamy.github.io/wasm-vm/)
#   - a pull request → deploy a PREVIEW under /pr-<N>/ and comment the URL on the PR
#   - a PR closing → remove its preview folder
# Publishes to the `gh-pages` branch (Pages source = "Deploy from a branch: gh-pages /").
name: pages

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]

# `contents: write` to push the built site to gh-pages; `pull-requests: write` to comment.
permissions:
  contents: write
  pull-requests: write

# One deploy at a time per PR (or for main); a new push cancels the in-flight build.
concurrency:
  group: pages-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    # Build + publish on open/update; the closed event is handled by `cleanup` below.
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Same pinned toolchain the rest of CI reads from rust-toolchain.toml, plus wasm32.
      - name: Read toolchain pin
        id: pin
        run: echo "toolchain=$(sed -n 's/^channel *= *"\(.*\)"/\1/p' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.pin.outputs.toolchain }}
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install wasm-pack
        run: curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      # `make web-build` = wasm-pack build + npm ci (pinned xterm.js) + copy pkg/guest/riscv-tests.
      - name: Build web demo
        run: make web-build

      - name: Compute deploy target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "dir=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "url=https://blamy.github.io/wasm-vm/pr-${{ github.event.pull_request.number }}/" >> "$GITHUB_OUTPUT"
          else
            echo "dir=" >> "$GITHUB_OUTPUT"
            echo "url=https://blamy.github.io/wasm-vm/" >> "$GITHUB_OUTPUT"
          fi

      # Publish web/ into gh-pages: a PR under /pr-<N>/, main at the root. keep_files preserves
      # every OTHER PR's preview folder (and main's content) so deploys never clobber siblings.
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
          destination_dir: ${{ steps.target.outputs.dir }}
          keep_files: true
          commit_message: "deploy ${{ steps.target.outputs.dir || 'root' }} @ ${{ github.sha }}"

      - name: Comment the preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.target.outputs.url }}
        with:
          script: |
            const url = process.env.PREVIEW_URL;
            const marker = '<!-- pages-preview -->';
            const body = `${marker}\n🚀 **Live preview** of this PR's browser demo: ${url}\n\n_Deployed from ${context.sha.slice(0,7)}. Updates on every push; removed when the PR closes._`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.data.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  cleanup:
    # When a PR closes (merged or not), delete its preview folder from gh-pages.
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
        continue-on-error: true
      - name: Remove PR preview
        run: |
          dir="pr-${{ github.event.pull_request.number }}"
          if [ -d "$dir" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "$dir"
            git commit -m "remove preview for PR #${{ github.event.pull_request.number }}"
            git push
          else
            echo "no preview folder $dir — nothing to clean up"
          fi

  index:
    # Regenerate the gh-pages landing page: every PR preview as a link, newest (highest #) first.
    # Runs after deploy (preview just added) OR cleanup (preview just removed); always() so a
    # skipped sibling (only one of the two runs per event) doesn't cancel it.
    needs: [deploy, cleanup]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
        continue-on-error: true
      - name: Build PR index (reverse order — newest on top)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Collect pr-<N> dirs, sort by N descending (newest first). while-read is portable
          # (no mapfile); process substitution keeps count/rows in the parent shell.
          rows=""
          count=0
          while IFS= read -r d; do
            [ -z "$d" ] && continue
            n="${d#pr-}"
            rows="${rows}      <li><a href=\"./${d}/\"><span class=\"num\">PR #${n}</span><span class=\"arrow\">live preview →</span></a></li>\n"
            count=$((count+1))
          done < <(ls -d pr-*/ 2>/dev/null | sed 's#/##' | sort -t- -k2 -n -r)
          [ "$count" -eq 0 ] && rows="      <li class=\"empty\">No open PR previews right now.</li>\n"
          cat > index.html <<HTML
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>wasm-vm — PR previews</title>
            <style>
              :root { color-scheme: dark; }
              * { box-sizing: border-box; }
              body { margin:0; min-height:100vh; background:#090b0f; color:#eef2f7;
                font-family: Inter, ui-sans-serif, system-ui, sans-serif;
                display:flex; align-items:flex-start; justify-content:center; padding:48px 20px; }
              main { width:100%; max-width:680px; }
              h1 { font-size:20px; margin:0 0 4px; font-weight:650; }
              .sub { color:#9aa6b2; font:13px ui-monospace, monospace; margin:0 0 24px; }
              ul { list-style:none; margin:0; padding:0; border:1px solid #242b36; border-radius:10px; overflow:hidden; }
              li a { display:flex; justify-content:space-between; align-items:center; gap:16px;
                padding:14px 18px; text-decoration:none; color:#eef2f7; border-bottom:1px solid #1a1f28;
                background:#10141b; transition:background 120ms; }
              li:last-child a { border-bottom:0; }
              li a:hover { background:#151c26; }
              .num { font:650 15px ui-monospace, monospace; }
              .arrow { color:#53d4ff; font:12px ui-monospace, monospace; }
              .empty { padding:18px; color:#9aa6b2; text-align:center; font:13px ui-monospace, monospace; }
              footer { margin-top:22px; color:#6b7684; font:12px ui-monospace, monospace; }
              footer a { color:#9aa6b2; }
            </style>
          </head>
          <body>
            <main>
              <h1>wasm-vm — RV64 in the browser</h1>
              <p class="sub">${count} open PR preview(s) · newest first</p>
              <ul>
          $(printf "%b" "$rows")
              </ul>
              <footer>Each PR deploys a live preview here via the <code>pages</code> workflow · <a href="https://github.com/BLamy/wasm-vm">source</a></footer>
            </main>
          </body>
          </html>
          HTML
          if ! git diff --quiet index.html 2>/dev/null || [ -n "$(git status --porcelain index.html)" ]; then
            git add index.html
            git commit -m "index: regenerate PR preview list ($count preview(s))"
            git push
          else
            echo "index.html unchanged — nothing to push"
          fi
