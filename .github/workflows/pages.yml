# Build the browser demo (web/) and deploy it to GitHub Pages.
#   - push to main → deploy to the site ROOT (https://blamy.github.io/wasm-vm/)
#   - a pull request → deploy a PREVIEW under /pr-<N>/ and comment the URL on the PR
#   - a PR closing → remove its preview folder
# Publishes to the `gh-pages` branch (Pages source = "Deploy from a branch: gh-pages /").
name: pages

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]

# `contents: write` to push the built site to gh-pages; `pull-requests: write` to comment.
permissions:
  contents: write
  pull-requests: write

# One deploy at a time per PR (or for main); a new push cancels the in-flight build.
concurrency:
  group: pages-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    # Build + publish on open/update; the closed event is handled by `cleanup` below.
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Same pinned toolchain the rest of CI reads from rust-toolchain.toml, plus wasm32.
      - name: Read toolchain pin
        id: pin
        run: echo "toolchain=$(sed -n 's/^channel *= *"\(.*\)"/\1/p' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.pin.outputs.toolchain }}
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install wasm-pack
        run: curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      # `make web-build` = wasm-pack build + npm ci (pinned xterm.js) + copy pkg/guest/riscv-tests.
      - name: Build web demo
        run: make web-build

      - name: Compute deploy target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "dir=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "url=https://blamy.github.io/wasm-vm/pr-${{ github.event.pull_request.number }}/" >> "$GITHUB_OUTPUT"
          else
            echo "dir=" >> "$GITHUB_OUTPUT"
            echo "url=https://blamy.github.io/wasm-vm/" >> "$GITHUB_OUTPUT"
          fi

      # Publish web/ into gh-pages: a PR under /pr-<N>/, main at the root. keep_files preserves
      # every OTHER PR's preview folder (and main's content) so deploys never clobber siblings.
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
          destination_dir: ${{ steps.target.outputs.dir }}
          keep_files: true
          commit_message: "deploy ${{ steps.target.outputs.dir || 'root' }} @ ${{ github.sha }}"

      - name: Comment the preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.target.outputs.url }}
        with:
          script: |
            const url = process.env.PREVIEW_URL;
            const marker = '<!-- pages-preview -->';
            const body = `${marker}\n🚀 **Live preview** of this PR's browser demo: ${url}\n\n_Deployed from ${context.sha.slice(0,7)}. Updates on every push; removed when the PR closes._`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.data.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  cleanup:
    # When a PR closes (merged or not), delete its preview folder from gh-pages.
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
        continue-on-error: true
      - name: Remove PR preview
        run: |
          dir="pr-${{ github.event.pull_request.number }}"
          if [ -d "$dir" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "$dir"
            git commit -m "remove preview for PR #${{ github.event.pull_request.number }}"
            git push
          else
            echo "no preview folder $dir — nothing to clean up"
          fi
