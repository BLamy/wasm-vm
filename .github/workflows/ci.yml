# E0-T02: the dual-target invariant, enforced by a machine.
# Mirrored exactly by `make ci` — if the Makefile and this file disagree, that's a bug.
# No continue-on-error, no `|| true`, no conditional job guards: red means red.

name: ci

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read toolchain pin
        id: pin
        run: echo "toolchain=$(sed -n 's/^channel *= *"\(.*\)"/\1/p' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.pin.outputs.toolchain }}
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read toolchain pin
        id: pin
        run: echo "toolchain=$(sed -n 's/^channel *= *"\(.*\)"/\1/p' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.pin.outputs.toolchain }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read toolchain pin
        id: pin
        run: echo "toolchain=$(sed -n 's/^channel *= *"\(.*\)"/\1/p' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.pin.outputs.toolchain }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
      # E1-T05: no host float arithmetic in the guest FP datapath (softfloat backend only).
      - run: bash tools/ci/no-host-float.sh
      # E1-T22: no HashMap/HashSet/host-clock/rand in guest-visible core (native==wasm hazards).
      - run: bash tools/ci/determinism-hazards.sh
      # riscv-tests rv64ui-p smoke gate (E0-T19) over the committed ELFs — no Docker.
      - run: cargo test -p wasm-vm-core --features zicsr-stub --test riscv_tests
      - run: bash tools/riscv-tests/check-quarantine.sh
      # Exhaustive 2^32 decode sweep (E0-T21): no panic + legal count == analytic tally.
      - run: cargo test -p wasm-vm-core --release --test exhaustive -- --ignored
      # Verify tooling integrity (E0-T25): every task has a verify target, no green-washing.
      - run: bash tools/verify/self_check.sh

  # E1-T19: the full riscv-tests regression wall over the committed ELFs, with the report
  # uploaded as an artifact and the reviewed allowlist enforced (a non-allowlisted failure or a
  # stale allowlist entry is red). Hermetic — no Docker/network.
  riscv-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read toolchain pin
        id: pin
        run: echo "toolchain=$(sed -n 's/^channel *= *"\(.*\)"/\1/p' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.pin.outputs.toolchain }}
      - uses: Swatinem/rust-cache@v2
      - run: bash tools/run_riscv_tests.sh
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: riscv-tests-report
          path: target/riscv-tests-report.*

  # E1-T22: the native and wasm32 builds are the same machine — both assert the frozen golden
  # fingerprints (tests/golden/determinism_golden.rs), so passing both proves native == wasm32.
  determinism:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read toolchain pin
        id: pin
        run: echo "toolchain=$(sed -n 's/^channel *= *"\(.*\)"/\1/p' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.pin.outputs.toolchain }}
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
      - run: bash tools/determinism_check.sh

  # E1-T23: perf-smoke — the release ALU-workload MIPS must clear a conservative order-of-magnitude
  # floor (catches ≥3× regressions; tolerates CI noise). NOT the full baseline (that's native
  # aarch64, in docs/perf/level1-baseline.md); this is the standing regression guard.
  perf-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read toolchain pin
        id: pin
        run: echo "toolchain=$(sed -n 's/^channel *= *"\(.*\)"/\1/p' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.pin.outputs.toolchain }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p wasm-vm-core --release --test perf_baseline perf_smoke_alu_above_floor -- --ignored --nocapture

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read toolchain pin
        id: pin
        run: echo "toolchain=$(sed -n 's/^channel *= *"\(.*\)"/\1/p' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.pin.outputs.toolchain }}
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p wasm-vm-core --no-default-features --target wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
      - run: wasm-pack build crates/wasm --target web
      - run: wasm-pack test --node crates/wasm
      # Same rv64ui-p ELFs under wasm32 (E0-T19).
      - run: wasm-pack test --node crates/wasm --features zicsr-stub

  # Explicit feature powerset for wasm-vm-core (E0-T15): every combination of
  # {std, trace} must build natively; {} and trace must build for wasm32.
  features:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        flags:
          - "--no-default-features"
          - "--no-default-features --features std"
          - "--no-default-features --features trace"
          - "--no-default-features --features std,trace"
    steps:
      - uses: actions/checkout@v4
      - name: Read toolchain pin
        id: pin
        run: echo "toolchain=$(sed -n 's/^channel *= *"\(.*\)"/\1/p' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.pin.outputs.toolchain }}
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p wasm-vm-core ${{ matrix.flags }}

  # The two no_std feature builds must also compile for wasm32.
  features-wasm:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        flags:
          - "--no-default-features"
          - "--no-default-features --features trace"
    steps:
      - uses: actions/checkout@v4
      - name: Read toolchain pin
        id: pin
        run: echo "toolchain=$(sed -n 's/^channel *= *"\(.*\)"/\1/p' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.pin.outputs.toolchain }}
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p wasm-vm-core ${{ matrix.flags }} --target wasm32-unknown-unknown
